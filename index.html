<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 13 · Data</title>
<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@500;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#059669;--bg:#FDF6EE;--card:#fff;--ink:#1A2E2E;--ink2:#5F7A7A;--ok:#16A34A;--no:#DC2626;--r:20px}
html,body{width:100%;min-height:100vh;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
.hdr{width:100%;position:sticky;top:0;z-index:100;background:var(--ac);box-shadow:0 4px 24px rgba(0,0,0,.15)}
.hdr-in{max-width:640px;margin:0 auto;padding:14px 20px 0;text-align:center}
.ch-n{font-family:'Grandstander',cursive;font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.65)}
.ch-t{font-family:'Grandstander',cursive;font-size:clamp(18px,5vw,26px);font-weight:900;color:#fff;line-height:1.2;margin:2px 0 10px;text-shadow:0 2px 8px rgba(0,0,0,.1)}
.tabs{display:flex;gap:4px;max-width:280px;margin:0 auto;background:rgba(0,0,0,.1);border-radius:14px 14px 0 0;padding:4px 4px 0}
.tab{flex:1;padding:9px 0;text-align:center;font-family:'Grandstander',cursive;font-size:14px;font-weight:800;cursor:pointer;border-radius:12px 12px 0 0;color:rgba(255,255,255,.6);transition:.2s;user-select:none}
.tab.on{background:var(--bg);color:var(--ac)}
.tab:not(.on):hover{color:#fff;background:rgba(255,255,255,.08)}
.page{max-width:620px;margin:0 auto;padding:14px 14px 60px}
.pnl{display:none;flex-direction:column;gap:16px}.pnl.on{display:flex}
.card{background:var(--card);border-radius:var(--r);padding:20px 18px;box-shadow:0 3px 16px rgba(0,0,0,.06);position:relative;overflow:hidden}
.cb{position:absolute;top:0;left:0;bottom:0;width:5px;border-radius:var(--r) 0 0 var(--r);background:var(--ac)}
.ct{font-family:'Grandstander',cursive;font-size:15px;font-weight:800;padding-left:14px;margin-bottom:3px;line-height:1.3}
.cs{font-size:12px;color:var(--ink2);padding-left:14px;margin-bottom:14px;line-height:1.6}
/* stepper */
.cr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.cg{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.03);border-radius:12px;padding:8px 12px;border:1.5px solid rgba(0,0,0,.06)}
.cl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;min-width:48px}
.sb{width:34px;height:34px;border-radius:50%;border:none;font-size:18px;font-weight:900;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.sb:active{transform:scale(.88)}
.sv{font-family:'Grandstander',cursive;font-size:28px;font-weight:900;min-width:28px;text-align:center}
/* blocks */
.bx{background:rgba(0,0,0,.02);border-radius:14px;border:1.5px solid rgba(0,0,0,.06);padding:12px;min-height:60px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:14px}
.flat{display:grid;grid-template-columns:repeat(10,8px);gap:1px}.flat-c{width:8px;height:8px;border-radius:1px;opacity:.8}
.rod{display:flex;flex-direction:column;gap:1px}.rod-c{width:10px;height:10px;border-radius:1px;opacity:.8}
.units{display:flex;flex-wrap:wrap;gap:2px;max-width:58px;align-self:flex-end}.unit-c{width:10px;height:10px;border-radius:2px;opacity:.8}
.sep{width:1px;background:#D1D5DB;align-self:stretch;margin:0 3px}
/* options */
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{font-family:'Grandstander',cursive;font-size:22px;font-weight:800;min-width:72px;height:54px;border-radius:16px;border:2.5px solid rgba(0,0,0,.08);background:#fff;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.opt:hover{border-color:var(--ac);transform:translateY(-2px)}
.opt.ok{background:#DCFCE7;border-color:var(--ok);color:#15803D;animation:pop .3s}
.opt.no{background:#FEE2E2;border-color:var(--no);color:var(--no);animation:shk .35s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fb{font-family:'Grandstander',cursive;font-size:14px;font-weight:700;min-height:20px;margin-top:10px;text-align:center}
.nbtn{font-family:'Grandstander',cursive;font-size:14px;font-weight:800;padding:10px 24px;border-radius:14px;border:none;background:var(--ac);color:#fff;cursor:pointer;margin-top:12px;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:.15s}
.nbtn:hover{transform:translateY(-1px);opacity:.9}
.btn{font-family:'Grandstander',cursive;font-size:14px;font-weight:800;padding:10px 20px;border-radius:14px;border:none;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:var(--ac);color:#fff}
.btn-g{background:#fff;color:var(--ink2);border:1.5px solid rgba(0,0,0,.1)}
.btn-g:hover{border-color:var(--ac);color:var(--ac)}
.chal{background:rgba(0,0,0,.02);border-radius:16px;padding:14px;border:1.5px dashed rgba(0,0,0,.1);margin-top:10px}
.chal-q{font-family:'Grandstander',cursive;font-size:14px;font-weight:800;margin-bottom:10px}
.chal-q b{color:var(--ac);font-size:22px}
canvas{display:block;border-radius:10px}
/* drag & tap shared */
.tappable{cursor:pointer;user-select:none;transition:transform .15s}
.tappable:hover{transform:scale(1.08)}
.tappable:active{transform:scale(.92)}
/* misc */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{display:inline-block;font-family:'Grandstander',cursive;font-size:14px;font-weight:800;padding:6px 18px;border-radius:30px}
.big{font-family:'Grandstander',cursive;font-weight:900;line-height:1;text-align:center}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="ch-n">Chapter 13</div>
  <div class="ch-t">Data</div>
  <div class="tabs">
    <div class="tab on" onclick="sw('learn')">Learn</div>
    <div class="tab" onclick="sw('practice')">Practice</div>
  </div>
</div></div>
<div class="page">

<div class="pnl on" id="p-learn">
  <div class="card"><div class="cb"></div>
    <div class="ct">Vote for your favourite activity</div>
    <div class="cs">Tap ❤️ to add a vote. Watch the tally marks and bar chart update live.</div>
    <div id="rGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px"></div>
    <button class="btn btn-g" onclick="resetV()" style="margin-bottom:14px">↺ Clear all votes</button>
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);margin-bottom:10px">Bar chart</div>
    <div style="position:relative;margin-bottom:4px">
      <div id="yAx" style="position:absolute;left:0;top:0;height:120px;display:flex;flex-direction:column-reverse;justify-content:space-between;width:26px"></div>
      <!-- bar columns only — no labels here -->
      <div id="chartB" style="display:flex;gap:8px;align-items:flex-end;height:120px;border-bottom:2.5px solid var(--ink);border-left:2px solid var(--ink);padding:0 6px;margin-left:28px;overflow:hidden"></div>
    </div>
    <!-- label row sits entirely below the chart box -->
    <div id="chartLbls" style="display:flex;gap:8px;margin-left:28px;padding:0 6px;margin-bottom:14px"></div>
    <div id="factsB" style="background:rgba(0,0,0,.02);border-radius:14px;padding:13px 15px;border:1.5px solid rgba(0,0,0,.06)"></div>
  </div>
</div>
<div class="pnl" id="p-practice">
  <div class="card"><div class="cb"></div>
    <div class="ct">Read the chart and answer</div>
    <div class="cs">Each bar shows how many children chose that activity. Pick the correct answer.</div>
    <div style="background:rgba(0,0,0,.02);border-radius:14px;padding:14px;border:1.5px solid rgba(0,0,0,.06);margin-bottom:14px">
      <!-- quiz bar columns only -->
      <div id="qBars" style="display:flex;gap:8px;align-items:flex-end;height:100px;border-bottom:2px solid var(--ink);border-left:1.5px solid var(--ink);padding:0 4px;overflow:hidden;margin-bottom:4px"></div>
      <!-- quiz label row below -->
      <div id="qLbls" style="display:flex;gap:8px;padding:0 4px"></div>
    </div>
    <div style="font-family:Grandstander,cursive;font-size:15px;font-weight:800;margin-bottom:12px" id="qTxt">Loading…</div>
    <div class="opts" id="qO"></div>
    <div class="fb" id="qF"></div>
    <button class="nbtn" onclick="nwQ13()">Next →</button>
  </div>
</div>

</div>
<script>
function sw(n){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.textContent.toLowerCase()===n)});document.querySelectorAll('.pnl').forEach(function(p){var a=p.id==='p-'+n;p.classList.toggle('on',a);p.style.display=a?'flex':'none'})}
document.getElementById('p-practice').style.display='none';
function pool4(ans,lo,hi){var s=new Set([ans]);var i=0;while(s.size<4&&i<50){i++;var w=ans+Math.round(Math.random()*8-4);if(w>=lo&&w<=hi&&w!==ans)s.add(w)}return[...s].sort(function(){return Math.random()-.5})}
function mkOpts(cid,items,correct,fid){var c=document.getElementById(cid);c.innerHTML='';items.forEach(function(n){var b=document.createElement('button');b.className='opt';b.textContent=n;b.onclick=function(){c.querySelectorAll('.opt').forEach(function(x){x.onclick=null});var fb=document.getElementById(fid);if(String(n)===String(correct)){b.classList.add('ok');fb.textContent='🎉 Correct!';fb.style.color='var(--ok)'}else{b.classList.add('no');fb.textContent='The answer is '+correct+'.';fb.style.color='var(--no)';c.querySelectorAll('.opt').forEach(function(x){if(String(x.textContent)===String(correct))x.classList.add('ok')})}};c.appendChild(b)})}

var ACTS=[{n:'Reading',e:'📚',c:'#D97706'},{n:'Swimming',e:'🏊',c:'#2563EB'},{n:'Drawing',e:'🎨',c:'#10B981'},{n:'Football',e:'⚽',c:'#EF4444'},{n:'Dancing',e:'💃',c:'#8B5CF6'}];
var votes=ACTS.map(function(){return 0});

function bldG(){
  var g=document.getElementById('rGrid');g.innerHTML='';
  ACTS.forEach(function(a,i){
    var d=document.createElement('div');
    d.style.cssText='background:#fff;border:1.5px solid rgba(0,0,0,.07);border-radius:14px;padding:10px 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0';
    d.innerHTML='<div style="font-size:26px;line-height:1">'+a.e+'</div>'
      +'<div style="font-size:9px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;word-break:break-word">'+a.n+'</div>'
      +'<div id="tly'+i+'" style="min-height:26px;display:flex;flex-wrap:wrap;gap:2px;justify-content:center;align-items:center;padding:0 2px;width:100%"></div>'
      +'<div style="font-family:Grandstander,cursive;font-size:24px;font-weight:900;color:'+a.c+'" id="vn'+i+'">0</div>'
      +'<button onclick="addV('+i+')" style="font-size:13px;cursor:pointer;background:'+a.c+';border:none;padding:5px 0;border-radius:7px;width:100%;color:#fff;font-weight:800;font-family:Grandstander,cursive">❤️ +1</button>'
      +'<button onclick="subV('+i+')" style="font-size:10px;font-weight:700;background:#fff;border:1.5px solid rgba(0,0,0,.1);color:var(--ink2);border-radius:6px;padding:3px 0;cursor:pointer;width:100%">− undo</button>';
    g.appendChild(d);
  });
}

/* SVG tally marks — proper groups of 5 */
function mkTally(n,col){
  if(!n) return '';
  var h='';
  var grps=Math.floor(n/5); var rem=n%5;
  for(var g=0;g<grps;g++){
    h+='<svg width="22" height="22" viewBox="0 0 22 22" style="display:inline-block;vertical-align:middle">';
    for(var v=0;v<4;v++) h+='<line x1="'+(3+v*4)+'" y1="2" x2="'+(3+v*4)+'" y2="20" stroke="'+col+'" stroke-width="2" stroke-linecap="round"/>';
    h+='<line x1="1" y1="20" x2="21" y2="2" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/></svg>';
  }
  if(rem){
    var w=2+(rem-1)*4+5;
    h+='<svg width="'+w+'" height="22" viewBox="0 0 '+w+' 22" style="display:inline-block;vertical-align:middle">';
    for(var v=0;v<rem;v++) h+='<line x1="'+(3+v*4)+'" y1="2" x2="'+(3+v*4)+'" y2="20" stroke="'+col+'" stroke-width="2" stroke-linecap="round"/>';
    h+='</svg>';
  }
  return h;
}

function addV(i){votes[i]=Math.min(votes[i]+1,12);rfsh()}
function subV(i){votes[i]=Math.max(votes[i]-1,0);rfsh()}
function resetV(){votes=ACTS.map(function(){return 0});rfsh()}

function rfsh(){
  ACTS.forEach(function(_,i){
    var t=document.getElementById('tly'+i);if(t)t.innerHTML=mkTally(votes[i],ACTS[i].c);
    var n=document.getElementById('vn'+i);if(n)n.textContent=votes[i];
  });
  bldChart();bldFacts();
}

function bldChart(){
  var mx=Math.max.apply(null,votes.concat([1]));
  var MH=110;
  var cb=document.getElementById('chartB');cb.innerHTML='';
  var cl=document.getElementById('chartLbls');cl.innerHTML='';

  ACTS.forEach(function(a,i){
    /* bar only — no text inside bar area */
    var bcol=document.createElement('div');
    bcol.style.cssText='flex:1;display:flex;align-items:flex-end;justify-content:center;height:100%';
    var bh=Math.round(votes[i]/mx*MH);
    var bar=document.createElement('div');
    bar.style.cssText='width:80%;border-radius:5px 5px 0 0;background:'+a.c+';height:'+bh+'px;min-height:3px;transition:height .5s cubic-bezier(.36,1.4,.6,1)';
    bcol.appendChild(bar);cb.appendChild(bcol);

    /* label row: count + emoji + name */
    var lbl=document.createElement('div');
    lbl.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding-top:4px';
    lbl.innerHTML='<div style="font-family:Grandstander,cursive;font-size:12px;font-weight:900;color:'+a.c+'">'+votes[i]+'</div>'
      +'<div style="font-size:14px">'+a.e+'</div>'
      +'<div style="font-size:9px;font-weight:700;color:var(--ink2);text-align:center;word-break:break-word">'+a.n+'</div>';
    cl.appendChild(lbl);
  });

  var ya=document.getElementById('yAx');ya.innerHTML='';
  var step=Math.max(1,Math.ceil(mx/4));
  for(var y=0;y<=mx;y+=step){
    var d=document.createElement('div');d.style.cssText='font-size:9px;font-weight:700;color:#9CA3AF;text-align:right;padding-right:3px';d.textContent=y;ya.appendChild(d);
  }
}

function bldFacts(){
  var tot=votes.reduce(function(a,b){return a+b},0);
  var mx=Math.max.apply(null,votes); var mn=Math.min.apply(null,votes);
  var fb=document.getElementById('factsB');
  if(!tot){fb.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--ink2)">Add some votes to see data facts.</div>';return}
  var most=ACTS.filter(function(_,i){return votes[i]===mx}).map(function(a){return a.e+' '+a.n}).join(', ');
  var least=ACTS.filter(function(_,i){return votes[i]===mn}).map(function(a){return a.e+' '+a.n}).join(', ');
  function fr(lbl,val){return'<div style="font-size:13px;font-weight:600;color:var(--ink);padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05);display:flex;gap:6px"><b style="color:var(--ac);white-space:nowrap">'+lbl+'</b>'+val+'</div>'}
  fb.innerHTML=fr('Total votes',tot)+fr('Most popular',most+' ('+mx+')')+fr('Least popular',least+' ('+mn+')')+fr('Difference',mx-mn);
}

bldG();bldChart();bldFacts();

/* Quiz */
var qVotes=[];
function nwQ13(){
  qVotes=ACTS.map(function(){return Math.floor(Math.random()*8)+1});
  var mx=Math.max.apply(null,qVotes); var MH=90;
  document.getElementById('qF').textContent='';

  var qb=document.getElementById('qBars');qb.innerHTML='';
  var ql=document.getElementById('qLbls');ql.innerHTML='';

  ACTS.forEach(function(a,i){
    /* bar only inside the chart box */
    var bcol=document.createElement('div');
    bcol.style.cssText='flex:1;display:flex;align-items:flex-end;justify-content:center;height:100%';
    var bh=Math.round(qVotes[i]/mx*MH);
    var bar=document.createElement('div');
    bar.style.cssText='width:80%;border-radius:5px 5px 0 0;background:'+a.c+';height:'+bh+'px;min-height:3px';
    bcol.appendChild(bar);qb.appendChild(bcol);

    /* label row below chart box */
    var lbl=document.createElement('div');
    lbl.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding-top:4px';
    lbl.innerHTML='<div style="font-family:Grandstander,cursive;font-size:12px;font-weight:900;color:'+a.c+'">'+qVotes[i]+'</div>'
      +'<div style="font-size:13px">'+a.e+'</div>'
      +'<div style="font-size:8px;font-weight:700;color:var(--ink2);text-align:center">'+a.n+'</div>';
    ql.appendChild(lbl);
  });

  var mostI=qVotes.indexOf(mx);
  var leastI=qVotes.indexOf(Math.min.apply(null,qVotes));
  var qt=['most','least','howmany','diff'][Math.floor(Math.random()*4)];
  var qTxt,ans,ansN;
  if(qt==='most'){qTxt='Which activity got the most votes?';ans=ACTS[mostI].e+' '+ACTS[mostI].n;ansN=mostI}
  else if(qt==='least'){qTxt='Which activity got the fewest votes?';ans=ACTS[leastI].e+' '+ACTS[leastI].n;ansN=leastI}
  else if(qt==='howmany'){var idx=Math.floor(Math.random()*ACTS.length);qTxt='How many children chose '+ACTS[idx].e+' '+ACTS[idx].n+'?';ans=''+qVotes[idx];ansN=qVotes[idx]}
  else{qTxt='How many more votes did '+ACTS[mostI].e+' get than '+ACTS[leastI].e+'?';ans=''+(qVotes[mostI]-qVotes[leastI]);ansN=qVotes[mostI]-qVotes[leastI]}
  document.getElementById('qTxt').textContent=qTxt;

  var op=document.getElementById('qO');op.innerHTML='';
  if(qt==='most'||qt==='least'){
    var pool=ACTS.map(function(a,i){return{txt:a.e+' '+a.n,ok:i===ansN}}).sort(function(){return Math.random()-.5});
    pool.forEach(function(p){
      var b=document.createElement('button');b.className='opt';b.style.fontSize='12px';b.style.minWidth='auto';b.style.padding='0 10px';b.textContent=p.txt;
      b.onclick=function(){op.querySelectorAll('.opt').forEach(function(x){x.onclick=null});var fb=document.getElementById('qF');
        if(p.ok){b.classList.add('ok');fb.textContent='🎉 Correct!';fb.style.color='var(--ok)'}
        else{b.classList.add('no');fb.textContent='The answer is '+ans+'.';fb.style.color='var(--no)';op.querySelectorAll('.opt').forEach(function(x){if(x.textContent===ans)x.classList.add('ok')})}};
      op.appendChild(b);
    });
  } else {
    var num=parseInt(ans);var pool=new Set([num]);var t=0;
    while(pool.size<4&&t<40){t++;var w=num+[-2,-1,1,2][Math.floor(Math.random()*4)];if(w>0&&w<=20)pool.add(w)}
    [...pool].sort(function(){return Math.random()-.5}).forEach(function(n){
      var b=document.createElement('button');b.className='opt';b.textContent=n;
      b.onclick=function(){op.querySelectorAll('.opt').forEach(function(x){x.onclick=null});var fb=document.getElementById('qF');
        if(n===num){b.classList.add('ok');fb.textContent='🎉 Correct! '+num;fb.style.color='var(--ok)'}
        else{b.classList.add('no');fb.textContent='The answer is '+num+'.';fb.style.color='var(--no)';op.querySelectorAll('.opt').forEach(function(x){if(parseInt(x.textContent)===num)x.classList.add('ok')})}};
      op.appendChild(b);
    });
  }
}
nwQ13();

</script>
</body>
</html>
